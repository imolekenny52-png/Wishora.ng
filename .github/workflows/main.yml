name: Wishora MVP CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  # JOB 1: Test and validate the Express Backend
  backend-services:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./server # Tells GitHub to jump inside your backend folder
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Backend Packages
        run: npm install  # Or 'npm ci' if you have a package-lock.json inside 'server'

      - name: Start Backend Test Suite
        run: |
          if grep -q '"test":' package.json; then
            npm test
          else
            echo "No backend tests written yet! Ready when you are."
          fi

  # JOB 2: Test and validate the React Frontend
  frontend-services:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./client # Tells GitHub to jump inside your frontend folder
    steps:
      - name: Checkout repository code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Frontend Packages
        run: npm install

      - name: Build React Application
        run: npm run build
